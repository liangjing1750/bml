<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLM - Business Language Modeling</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
  <div class="toolbar-left">
    <span class="logo">BLM</span>
    <span id="file-name" class="file-name" data-testid="current-file-name">—</span>
    <span id="modified-dot" class="modified-dot hidden">●</span>
  </div>
  <div class="toolbar-right">
    <button onclick="App.cmdNew()" class="btn btn-ghost" data-testid="toolbar-new-button">新建</button>
    <button onclick="App.cmdOpen()" class="btn btn-ghost" data-testid="toolbar-open-button">打开</button>
    <button onclick="App.cmdSave()" class="btn btn-primary" id="btn-save">保存</button>
    <button onclick="App.cmdExport()" class="btn btn-ghost">导出 MD</button>
  </div>
</div>

<div id="layout">
  <aside id="sidebar">
    <div id="sidebar-content"></div>
    <div id="sidebar-resize-handle" data-testid="sidebar-resize-handle" onmousedown="startSidebarResize(event)"></div>
  </aside>
  <div id="sb-toggle-wrap">
    <button id="sb-toggle-btn" onclick="toggleSidebar()" title="展开/折叠侧边栏">折叠</button>
  </div>
  <main id="content">
    <div id="tab-bar"></div>
    <div id="tab-content"></div>
  </main>
</div>

<!-- 新建文档弹窗 -->
<div id="modal-overlay" class="hidden" onclick="App.closeModal()" data-testid="new-doc-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>新建文档</h3>
    <input
      id="new-doc-name"
      type="text"
      placeholder="输入文档名称，例如：入库流程"
      data-testid="new-doc-name-input"
      onkeydown="if(event.key==='Enter') App.confirmNew()"
    >
    <div class="modal-footer">
      <button onclick="App.closeModal()" class="btn btn-ghost">取消</button>
      <button onclick="App.confirmNew()" class="btn btn-primary" data-testid="new-doc-confirm-button">创建</button>
    </div>
  </div>
</div>

<!-- 打开文档弹窗 -->
<div id="open-modal-overlay" class="hidden" onclick="App.closeOpenModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>打开文档</h3>
    <div id="file-list" class="file-list"></div>
    <div class="modal-footer">
      <button onclick="App.closeOpenModal()" class="btn btn-ghost">取消</button>
    </div>
  </div>
</div>

<script src="state.js"></script>
<script src="api.js"></script>
<script src="render.js"></script>
<script src="domain.js"></script>
<script src="process.js"></script>
<script src="entity.js"></script>
<script src="preview.js"></script>
<script src="app.js"></script>

<!-- CDN: Mermaid + marked，联网时加载，离线时降级 -->
<script type="module">
  try {
    const { default: mermaid } = await import('https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs');
    window.mermaidLib = mermaid;
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
  } catch (e) {
    console.warn('Mermaid 加载失败');
  }

  try {
    const { marked } = await import('https://cdn.jsdelivr.net/npm/marked@12/src/marked.js');
    window.markedLib = marked;
  } catch (e) {
    console.warn('marked 加载失败');
  }
</script>

</body>
</html>
